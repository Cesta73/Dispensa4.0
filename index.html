  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dispensa Smart</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>
  <style>
    :root {
      --bg: #f7f6f2; --card: #ffffff; --text: #222222; --muted: #666666;
      --primary: #0b6b6f; --primary-soft: #d9ecec; --danger: #b42318;
      --border: #dddddd; --radius: 14px; --shadow: 0 4px 14px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
    header { position: sticky; top: 0; z-index: 10; background: var(--card); border-bottom: 1px solid var(--border); padding: 14px; }
    h1 { margin: 0; font-size: 22px; }
    h2 { margin-top: 0; font-size: 20px; }
    main { max-width: 860px; margin: 0 auto; padding: 14px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; box-shadow: var(--shadow); }
    form { margin: 0; }
    input, button, select { width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); font-size: 16px; }
    button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
    button.secondary { background: #e8ecec; color: #222; }
    button.danger { background: var(--danger); }
    button.small { width: auto; padding: 9px 12px; margin-right: 6px; margin-bottom: 6px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .muted { color: var(--muted); font-size: 14px; }
    .hidden { display: none; }
    .product { border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-top: 10px; background: #fff; }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 12px; margin-right: 6px; margin-top: 6px; }
    .ok { background: #dcfce7; color: #166534; }
    .warn { background: #fef3c7; color: #92400e; }
    .late { background: #fee2e2; color: #991b1b; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; }
    .toolbar button { flex: 1 1 180px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .status-box { padding: 10px; border-radius: 10px; background: var(--primary-soft); margin-top: 10px; font-size: 14px; }
    .filters-box { background: #f9fbfb; border: 1px dashed var(--border); border-radius: 12px; padding: 10px; margin-bottom: 10px; }
    video { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid var(--border); background: #000; }
    @media (max-width: 700px) { .row, .row3 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>Dispensa Smart</h1>
    <div class="muted">Versione 3 con filtri categoria e scadenza</div>
  </header>

  <main>
    <section class="card" id="authCard">
      <h2>Accesso</h2>
      <form id="authForm">
        <input type="email" id="email" placeholder="La tua email" autocomplete="email" required />
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
        <div class="toolbar">
          <button type="button" id="registerBtn">Registrati</button>
          <button type="button" id="loginBtn" class="secondary">Accedi</button>
        </div>
      </form>
      <div class="status-box muted" id="authMsg">Inserisci email e password.</div>
    </section>

    <section class="card hidden" id="appCard">
      <h2>Nuovo prodotto</h2>
      <form id="productForm">
        <input type="text" id="productName" placeholder="Nome prodotto" required />
        <input type="text" id="barcode" placeholder="Barcode" />
        <div class="row">
          <input type="text" id="brand" placeholder="Marca" />
          <input type="text" id="category" placeholder="Categoria" />
        </div>
        <div class="row">
          <input type="number" id="quantity" placeholder="Quantità" value="1" min="1" step="1" />
          <input type="date" id="expiryDate" />
        </div>
        <div class="toolbar">
          <button type="button" id="scanBtn">Scansiona barcode</button>
          <button type="button" id="saveBtn">Salva prodotto</button>
        </div>
      </form>
      <div id="scannerArea" class="hidden">
        <video id="video"></video>
        <button id="stopScanBtn" class="secondary" type="button">Ferma scansione</button>
      </div>
      <div class="status-box muted" id="saveMsg">Pronto.</div>
    </section>

    <section class="card hidden" id="listCard">
      <h2>Prodotti</h2>
      <div class="filters-box">
        <div class="row3">
          <div>
            <label class="muted" for="searchInput">Ricerca</label>
            <input type="text" id="searchInput" placeholder="Cerca prodotto..." />
          </div>
          <div>
            <label class="muted" for="categoryFilter">Categoria</label>
            <select id="categoryFilter">
              <option value="">Tutte</option>
            </select>
          </div>
          <div>
            <label class="muted" for="expiryFilter">Scadenza</label>
            <select id="expiryFilter">
              <option value="all">Tutte</option>
              <option value="expired">Scaduti</option>
              <option value="30">Entro 30 giorni</option>
              <option value="90">Entro 90 giorni</option>
              <option value="none">Senza scadenza</option>
            </select>
          </div>
        </div>
        <div class="row3">
          <div>
            <label class="muted" for="sortFilter">Ordina per</label>
            <select id="sortFilter">
              <option value="name">Nome</option>
              <option value="expiry">Scadenza più vicina</option>
              <option value="qty_desc">Quantità maggiore</option>
              <option value="qty_asc">Quantità minore</option>
            </select>
          </div>
          <div>
            <label class="muted">Azioni filtri</label>
            <button type="button" id="resetFiltersBtn" class="secondary">Reset filtri</button>
          </div>
          <div class="muted" id="filterSummary" style="display:flex;align-items:center;">Pronto.</div>
        </div>
      </div>
      <div id="productList"></div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://ujwhtxhbwtsockwnuvul.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqd2h0eGhid3Rzb2Nrd251dnVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDE1NzYsImV4cCI6MjA5MTcxNzU3Nn0.U-aPCivPbIImm8VeSaYk4GV_IL9OAH80xTZmqAMb5Z0";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const authCard = document.getElementById("authCard");
    const appCard = document.getElementById("appCard");
    const listCard = document.getElementById("listCard");
    const authForm = document.getElementById("authForm");
    const productForm = document.getElementById("productForm");
    const authMsg = document.getElementById("authMsg");
    const saveMsg = document.getElementById("saveMsg");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const productNameInput = document.getElementById("productName");
    const barcodeInput = document.getElementById("barcode");
    const brandInput = document.getElementById("brand");
    const categoryInput = document.getElementById("category");
    const quantityInput = document.getElementById("quantity");
    const expiryDateInput = document.getElementById("expiryDate");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");
    const expiryFilter = document.getElementById("expiryFilter");
    const sortFilter = document.getElementById("sortFilter");
    const resetFiltersBtn = document.getElementById("resetFiltersBtn");
    const filterSummary = document.getElementById("filterSummary");
    const productList = document.getElementById("productList");
    const scanBtn = document.getElementById("scanBtn");
    const stopScanBtn = document.getElementById("stopScanBtn");
    const scannerArea = document.getElementById("scannerArea");
    const video = document.getElementById("video");
    const registerBtn = document.getElementById("registerBtn");
    const loginBtn = document.getElementById("loginBtn");
    const saveBtn = document.getElementById("saveBtn");

    let currentUser = null;
    let householdId = null;
    let scannerControls = null;
    let codeReader = null;
    let cachedProducts = [];

    authForm.addEventListener("submit", (e) => e.preventDefault());
    productForm.addEventListener("submit", (e) => e.preventDefault());

    function setAuthMessage(text) { authMsg.textContent = text; }
    function setSaveMessage(text) { saveMsg.textContent = text; }
    function showApp() { authCard.classList.add("hidden"); appCard.classList.remove("hidden"); listCard.classList.remove("hidden"); }
    function formatDate(dateString) {
      if (!dateString) return "-";
      const d = new Date(dateString);
      if (isNaN(d)) return dateString;
      return d.toLocaleDateString("it-IT");
    }
    function escapeHtml(value) {
      return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }
    function convertItalianDateToIso(value) {
      if (!value) return null;
      const clean = value.trim().replaceAll("/", "-");
      const parts = clean.split("-");
      if (parts.length !== 3) return null;
      const [dd, mm, yyyy] = parts;
      if (!dd || !mm || !yyyy || yyyy.length !== 4) return null;
      return `${yyyy}-${mm.padStart(2, "0")}-${dd.padStart(2, "0")}`;
    }
    function getExpiryInfo(expiryDate) {
      if (!expiryDate) return { label: "Senza scadenza", className: "", days: null };
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const exp = new Date(expiryDate);
      exp.setHours(0, 0, 0, 0);
      const diff = Math.ceil((exp - today) / (1000 * 60 * 60 * 24));
      if (diff < 0) return { label: "Scaduto", className: "late", days: diff };
      if (diff <= 30) return { label: "Scade presto", className: "warn", days: diff };
      return { label: "Ok", className: "ok", days: diff };
    }

    async function register() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      if (!email || !password) return setAuthMessage("Inserisci email e password.");
      setAuthMessage("Registrazione in corso...");
      const { error } = await sb.auth.signUp({ email, password });
      if (error) return setAuthMessage("Errore registrazione: " + error.message);
      setAuthMessage("Registrazione eseguita. Se richiesto, conferma la mail e poi fai login.");
    }

    async function login() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      if (!email || !password) return setAuthMessage("Inserisci email e password.");
      setAuthMessage("Accesso in corso...");
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) return setAuthMessage("Errore accesso: " + error.message);
      currentUser = data.user;
      await ensureProfile();
      showApp();
      await loadProducts();
      setAuthMessage("Accesso eseguito.");
    }

    async function ensureProfile() {
      const { data: existingProfile, error: profileError } = await sb.from("profiles").select("*").eq("id", currentUser.id).maybeSingle();
      if (profileError) return setAuthMessage("Errore lettura profilo: " + profileError.message);
      if (existingProfile && existingProfile.household_id) { householdId = existingProfile.household_id; return; }
      const { data: newHousehold, error: householdError } = await sb.from("households").insert([{ name: "Casa Gian" }]).select().single();
      if (householdError) return setAuthMessage("Errore creazione famiglia: " + householdError.message);
      householdId = newHousehold.id;
      const { error: upsertError } = await sb.from("profiles").upsert([{ id: currentUser.id, household_id: householdId, role: "owner" }]);
      if (upsertError) setAuthMessage("Errore salvataggio profilo: " + upsertError.message);
    }

    async function saveProduct() {
      if (!householdId || !currentUser) return setSaveMessage("Utente non pronto. Rifai il login.");
      const name = productNameInput.value.trim();
      const barcode = barcodeInput.value.trim();
      const brand = brandInput.value.trim();
      const category = categoryInput.value.trim();
      const quantity = Number(quantityInput.value || 1);
      const expiryDate = expiryDateInput.value || null;
      if (!name) return setSaveMessage("Inserisci il nome prodotto.");
      setSaveMessage("Salvataggio in corso...");
      const { data: product, error: productError } = await sb.from("products").insert([{ household_id: householdId, name, barcode, brand, category }]).select().single();
      if (productError) return setSaveMessage("Errore prodotto: " + productError.message);
      const { data: lot, error: lotError } = await sb.from("lots").insert([{ product_id: product.id, quantity, expiry_date: expiryDate }]).select().single();
      if (lotError) return setSaveMessage("Errore lotto: " + lotError.message);
      const { error: movementError } = await sb.from("movements").insert([{ household_id: householdId, product_id: product.id, lot_id: lot.id, movement_type: "load", quantity, note: "Carico iniziale", created_by: currentUser.id }]);
      if (movementError) return setSaveMessage("Prodotto salvato ma errore movimento: " + movementError.message);
      productForm.reset(); quantityInput.value = 1;
      setSaveMessage("Prodotto salvato correttamente.");
      await loadProducts();
    }

    function populateCategoryFilter(products) {
      const categories = [...new Set(products.map(p => (p.category || "").trim()).filter(Boolean))].sort((a,b) => a.localeCompare(b, 'it'));
      const current = categoryFilter.value;
      categoryFilter.innerHTML = '<option value="">Tutte</option>' + categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
      if (categories.includes(current)) categoryFilter.value = current;
    }

    async function loadProducts() {
      if (!householdId) return;
      const { data, error } = await sb.from("products").select(`id,name,barcode,brand,category,created_at,lots(id,quantity,expiry_date)`).eq("household_id", householdId).order("created_at", { ascending: false });
      if (error) { productList.innerHTML = "<p>Errore caricamento prodotti: " + error.message + "</p>"; return; }
      cachedProducts = data || [];
      populateCategoryFilter(cachedProducts);
      renderProducts();
    }

    function getTotalQty(product) {
      return (product.lots || []).reduce((sum, lot) => sum + Number(lot.quantity || 0), 0);
    }

    function getNearestExpiry(product) {
      return (product.lots || []).filter(lot => lot.expiry_date).sort((a,b) => new Date(a.expiry_date) - new Date(b.expiry_date))[0] || null;
    }

    function passesExpiryFilter(product) {
      const filter = expiryFilter.value;
      if (filter === 'all') return true;
      const nearest = getNearestExpiry(product);
      if (filter === 'none') return !nearest;
      if (!nearest) return false;
      const info = getExpiryInfo(nearest.expiry_date);
      if (filter === 'expired') return info.days !== null && info.days < 0;
      if (filter === '30') return info.days !== null && info.days >= 0 && info.days <= 30;
      if (filter === '90') return info.days !== null && info.days >= 0 && info.days <= 90;
      return true;
    }

    function renderProducts() {
      const term = searchInput.value.trim().toLowerCase();
      const selectedCategory = categoryFilter.value.trim().toLowerCase();

      let filtered = cachedProducts.filter(product => {
        const text = [product.name || "", product.barcode || "", product.brand || "", product.category || ""].join(" ").toLowerCase();
        const categoryOk = !selectedCategory || (product.category || "").trim().toLowerCase() === selectedCategory;
        return text.includes(term) && categoryOk && passesExpiryFilter(product);
      });

      const sortMode = sortFilter.value;
      filtered.sort((a, b) => {
        if (sortMode === 'name') return (a.name || '').localeCompare((b.name || ''), 'it');
        if (sortMode === 'qty_desc') return getTotalQty(b) - getTotalQty(a);
        if (sortMode === 'qty_asc') return getTotalQty(a) - getTotalQty(b);
        if (sortMode === 'expiry') {
          const ea = getNearestExpiry(a);
          const eb = getNearestExpiry(b);
          const ta = ea ? new Date(ea.expiry_date).getTime() : 9999999999999;
          const tb = eb ? new Date(eb.expiry_date).getTime() : 9999999999999;
          return ta - tb;
        }
        return 0;
      });

      filterSummary.textContent = `Visualizzati ${filtered.length} prodotti su ${cachedProducts.length}`;

      if (!filtered.length) {
        productList.innerHTML = "<p>Nessun prodotto trovato.</p>";
        return;
      }

      productList.innerHTML = filtered.map(product => {
        const totalQty = getTotalQty(product);
        const nearestExpiry = getNearestExpiry(product);
        const expInfo = nearestExpiry ? getExpiryInfo(nearestExpiry.expiry_date) : null;
        return `
          <div class="product">
            <strong>${escapeHtml(product.name || "")}</strong><br>
            <span class="muted">Marca: ${escapeHtml(product.brand || "-")} | Categoria: ${escapeHtml(product.category || "-")} | Barcode: ${escapeHtml(product.barcode || "-")}</span><br>
            <span>Quantità totale: <strong>${totalQty}</strong></span><br>
            <span>Scadenza più vicina: ${nearestExpiry ? formatDate(nearestExpiry.expiry_date) : "-"}</span><br>
            ${expInfo ? `<span class="badge ${expInfo.className}">${expInfo.label}</span>` : `<span class="badge">Senza scadenza</span>`}
            <div class="actions">
              <button class="small" onclick="quickAdd('${product.id}')">+1</button>
              <button class="small secondary" onclick="quickRemove('${product.id}')">-1</button>
              <button class="small danger" onclick="deleteProduct('${product.id}', '${escapeHtml(product.name || "")}')">Elimina</button>
            </div>
          </div>
        `;
      }).join("");
    }

    async function quickAdd(productId) {
      const userDate = prompt("Data scadenza nuovo pezzo?\nFormato GG-MM-AAAA\nLascia vuoto se non serve", "");
      const isoDate = userDate ? convertItalianDateToIso(userDate) : null;
      if (userDate && !isoDate) return alert("Data non valida. Usa il formato GG-MM-AAAA");
      const { data: lot, error: lotError } = await sb.from("lots").insert([{ product_id: productId, quantity: 1, expiry_date: isoDate }]).select().single();
      if (lotError) return alert("Errore carico: " + lotError.message);
      const { error: mvError } = await sb.from("movements").insert([{ household_id: householdId, product_id: productId, lot_id: lot.id, movement_type: "load", quantity: 1, note: "Carico rapido +1", created_by: currentUser.id }]);
      if (mvError) return alert("Caricato lotto ma errore movimento: " + mvError.message);
      await loadProducts();
    }

    async function quickRemove(productId) {
      const product = cachedProducts.find(p => p.id === productId);
      if (!product) return alert("Prodotto non trovato.");
      const lots = (product.lots || []).filter(l => Number(l.quantity || 0) > 0);
      if (!lots.length) return alert("Nessuna quantità disponibile da scaricare.");
      lots.sort((a, b) => {
        const da = a.expiry_date ? new Date(a.expiry_date).getTime() : 9999999999999;
        const db = b.expiry_date ? new Date(b.expiry_date).getTime() : 9999999999999;
        return da - db;
      });
      const selectedLot = lots[0];
      const newQty = Number(selectedLot.quantity || 0) - 1;
      const { error: updError } = await sb.from("lots").update({ quantity: newQty }).eq("id", selectedLot.id);
      if (updError) return alert("Errore scarico: " + updError.message);
      const { error: mvError } = await sb.from("movements").insert([{ household_id: householdId, product_id: productId, lot_id: selectedLot.id, movement_type: "unload", quantity: 1, note: "Scarico rapido -1", created_by: currentUser.id }]);
      if (mvError) return alert("Scarico fatto ma errore movimento: " + mvError.message);
      await loadProducts();
    }

    async function deleteProduct(productId, productName) {
      const ok = confirm(`Vuoi davvero eliminare il prodotto: ${productName} ?\n\nAttenzione: cancellerai anche i lotti collegati.`);
      if (!ok) return;
      const { error } = await sb.from("products").delete().eq("id", productId);
      if (error) return alert("Errore eliminazione: " + error.message);
      await loadProducts();
    }

    async function startScanner() {
      scannerArea.classList.remove("hidden");
      try {
        codeReader = new ZXingBrowser.BrowserMultiFormatReader();
        const devices = await ZXingBrowser.BrowserCodeReader.listVideoInputDevices();
        if (!devices || !devices.length) return alert("Nessuna fotocamera trovata.");
        let selectedDeviceId = devices[0].deviceId;
        const rearCamera = devices.find(device => (device.label || "").toLowerCase().includes("back") || (device.label || "").toLowerCase().includes("rear") || (device.label || "").toLowerCase().includes("environment"));
        if (rearCamera) selectedDeviceId = rearCamera.deviceId;
        scannerControls = await codeReader.decodeFromVideoDevice(selectedDeviceId, video, (result) => {
          if (result) { barcodeInput.value = result.text; stopScanner(); }
        });
      } catch (err) { alert("Errore scanner: " + err.message); }
    }

    function stopScanner() {
      scannerArea.classList.add("hidden");
      if (scannerControls && typeof scannerControls.stop === "function") scannerControls.stop();
      if (codeReader && typeof codeReader.reset === "function") codeReader.reset();
      scannerControls = null; codeReader = null;
    }

    function resetFilters() {
      searchInput.value = "";
      categoryFilter.value = "";
      expiryFilter.value = "all";
      sortFilter.value = "name";
      renderProducts();
    }

    async function checkExistingSession() {
      const { data, error } = await sb.auth.getSession();
      if (error) return setAuthMessage("Errore sessione: " + error.message);
      if (data && data.session && data.session.user) {
        currentUser = data.session.user;
        await ensureProfile();
        showApp();
        await loadProducts();
        setAuthMessage("Sessione già attiva.");
      }
    }

    registerBtn.addEventListener("click", register);
    loginBtn.addEventListener("click", login);
    saveBtn.addEventListener("click", saveProduct);
    scanBtn.addEventListener("click", startScanner);
    stopScanBtn.addEventListener("click", stopScanner);
    searchInput.addEventListener("input", renderProducts);
    categoryFilter.addEventListener("change", renderProducts);
    expiryFilter.addEventListener("change", renderProducts);
    sortFilter.addEventListener("change", renderProducts);
    resetFiltersBtn.addEventListener("click", resetFilters);

    checkExistingSession();
    window.quickAdd = quickAdd;
    window.quickRemove = quickRemove;
    window.deleteProduct = deleteProduct;
  </script>
</body>
</html>
